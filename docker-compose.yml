services:
  api-gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      API_HTTP_ADDR: :8080
      SCHEDULER_GRPC_ADDR: scheduler:9090
      API_TOKEN: ${API_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - scheduler
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: scheduler
    environment:
      SCHEDULER_GRPC_ADDR: :9090
      SCHEDULER_METRICS_ADDR: :9100
      SCHEDULER_RANGE_LEASE_TTL: 30s
      DATABASE_URL: postgres://sdp:sdp@postgres:5432/crypto_jobs?sslmode=disable
    ports:
      - "9100:9100"
      - "9090:9090"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: worker
    environment:
      WORKER_CONCURRENCY: 4
      SCHEDULER_GRPC_ADDR: scheduler:9090
    depends_on:
      - scheduler
    deploy:
      replicas: 1

  terminal:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: terminal
    depends_on:
      - api-gateway
      - worker
    stdin_open: true
    tty: true
    environment:
      API_BASE_URL: http://api-gateway:8080
      API_TOKEN: ${API_TOKEN:-}
      SCHEDULER_HEALTH_URL: http://scheduler:9100/healthz
      POSTGRES_ENDPOINT: postgres:5432
    profiles:
      - tools

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_jobs
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp -d crypto_jobs"]
      interval: 10s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z

volumes:
  postgres-data:
