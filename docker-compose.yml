services:
  api-gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      API_HTTP_ADDR: :8080
      SCHEDULER_GRPC_ADDR: scheduler:9090
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
      - scheduler

  scheduler:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: scheduler
    environment:
      SCHEDULER_GRPC_ADDR: :9090
      SCHEDULER_METRICS_ADDR: :9100
      SCHEDULER_RANGE_LEASE_TTL: 30s
      REDIS_ADDR: redis:6379
    ports:
      - "9100:9100"
      - "9090:9090"
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: worker
    environment:
      WORKER_CONCURRENCY: 4
      SCHEDULER_GRPC_ADDR: scheduler:9090
      REDIS_ADDR: redis:6379
    depends_on:
      - scheduler
    deploy:
      replicas: 1

  terminal:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: terminal
    environment:
      API_BASE_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
      - worker
    stdin_open: true
    tty: true
    profiles:
      - tools

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_jobs
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro,Z

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z

volumes:
  postgres-data:
